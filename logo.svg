<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <!-- Rounded square background -->
  <rect width="44" height="44" rx="12" fill="#E8845A"/>

  <!-- Erlenmeyer flask body -->
  <path d="M17 10 L17 22 L11.5 33 Q10.5 35 12 35 L32 35 Q33.5 35 32.5 33 L27 22 L27 10 Z"
        fill="white" fill-opacity="0.22" stroke="white" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Flask neck rim -->
  <line x1="15.5" y1="13" x2="28.5" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bubbles in flask -->
  <circle cx="19" cy="28" r="2" fill="white" fill-opacity="0.55"/>
  <circle cx="24.5" cy="31" r="1.3" fill="white" fill-opacity="0.4"/>
  <circle cx="22" cy="26" r="1" fill="white" fill-opacity="0.35"/>

  <!-- Orbit ring (ellipse) -->
  <ellipse cx="22" cy="22" rx="19" ry="8" stroke="white" stroke-width="1.2" stroke-opacity="0.3" fill="none"
           transform="rotate(-30 22 22)"/>

  <!-- Electron dot on orbit -->
  <circle cx="34.5" cy="14.5" r="2.2" fill="white" fill-opacity="0.75"/>
</svg>
